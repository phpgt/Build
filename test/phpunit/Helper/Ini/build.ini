[script/**/*.es6]
require=node_modules/.bin/esbuild >=1.2.3,babel,esbuild ^0.17
execute=./node_modules/.bin/esbuild "script/script file.es6" --bundle --sourcemap --outfile=www/script.js --loader:.es6=js --target=chrome105,firefox105,edge105,safari15

[style/**/*.scss]
execute=sass ./style/style.scss ./www/style.css
